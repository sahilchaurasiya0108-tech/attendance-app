<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Office Attendance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: #e2e8f0; font-family: 'DM Sans', system-ui, sans-serif;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100dvh; padding: 2rem; text-align: center; }
    .icon { width: 64px; height: 64px; background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3);
            border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    button { margin-top: 1.5rem; background: #6366f1; color: white; border: none; padding: 0.75rem 2rem;
             border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.143 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>No internet connection. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
